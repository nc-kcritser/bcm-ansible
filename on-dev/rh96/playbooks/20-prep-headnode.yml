---
- name: Prepare RHEL 9.x Head Node for BCM Installation
  hosts: head_node
  become: yes
  gather_facts: yes
  vars:
    mysql_root_password: "Dellsvcs1"  # Match what's in host_vars
    controller_pubkey: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

  tasks:
    - name: Display target host information
      debug:
        msg: "Preparing {{ ansible_hostname }} ({{ ansible_default_ipv4.address }})"

    - name: Ensure /root/.ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Add controller SSH public key to authorized_keys
      authorized_key:
        user: root
        state: present
        key: "{{ controller_pubkey }}"

    - name: Install EPEL repository
      dnf:
        name: epel-release
        state: present

    - name: Remove MySQL if present (conflicts with MariaDB)
      dnf:
        name:
          - mysql
          - mysql-server
          - mysql-common
          - mysql-community-server
          - mysql-community-client
        state: absent
      ignore_errors: yes  # OK if none of these are installed

    - name: Install required packages
      dnf:
        name:
          - python3
          - python3-pip
          - mariadb-server
          - python3-PyMySQL
        state: present

    - name: Stop MariaDB if running (pre-cleanup)
      systemd:
        name: mariadb
        state: stopped
      ignore_errors: yes

    - name: Remove leftover MySQL/MariaDB data directory
      file:
        path: /var/lib/mysql
        state: absent

    - name: Recreate empty data directory with correct ownership
      file:
        path: /var/lib/mysql
        state: directory
        owner: mysql
        group: mysql
        mode: '0755'

    - name: Initialize MariaDB database
      command: mariadb-install-db --user=mysql --datadir=/var/lib/mysql
      args:
        creates: /var/lib/mysql/mysql  # Only runs if not already initialized

    - name: Start and enable MariaDB service
      systemd:
        name: mariadb
        state: started
        enabled: yes

    - name: Set MariaDB root password
      mysql_user:
        name: root
        password: "{{ mysql_root_password }}"
        login_unix_socket: /var/lib/mysql/mysql.sock
        state: present
      ignore_errors: yes  # In case password is already set

    - name: Check if SELinux is disabled
      command: getenforce
      register: selinux_status
      changed_when: false

    - name: Disable SELinux (runtime)
      command: setenforce 0
      when: selinux_status.stdout != "Disabled"
      ignore_errors: yes

    - name: Disable SELinux (persistent)
      lineinfile:
        path: /etc/selinux/config
        regexp: '^SELINUX='
        line: 'SELINUX=disabled'
        state: present

    - name: Verify cm.repo exists
      stat:
        path: /root/cm.repo
      register: cm_repo_check

    - name: Alert if cm.repo is missing
      assert:
        that:
          - cm_repo_check.stat.exists
        fail_msg: "CRITICAL: cm.repo file not found at /root/cm.repo - this is required for BCM installation"

    - name: Display cm.repo status
      debug:
        msg: "{{ 'cm.repo found' if cm_repo_check.stat.exists else 'WARNING: cm.repo NOT FOUND at /root/cm.repo' }}"

    - name: Display summary
      debug:
        msg:
          - "Head node preparation complete!"
          - "SSH key: Added for controller"
          - "MariaDB: Running"
          - "SELinux: {{ selinux_status.stdout }}"
          - "cm.repo: {{ 'Present' if cm_repo_check.stat.exists else 'MISSING' }}"
          - "Ready for BCM installation (local method)"